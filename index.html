<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHADOW SURVIVOR: ETERNAL NIGHT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/overlays.css">
</head>
<body>

<canvas id="game"></canvas>
<div id="vignette"></div>
<div id="flash"></div>
<div id="dmg-flash"></div>
<div id="wave-indicator"></div>
<div id="kill-milestone"></div>

<!-- HUD -->
<div id="hud">
    <div class="xp-container"><div id="xp-fill"></div></div>
    <div id="xp-label">XP</div>
    <div class="top-bar">
        <div class="stat-group"><span class="label">Time</span><span id="txt-time" class="value">00:00</span></div>
        <div class="stat-group"><span class="label">Level</span><span id="txt-lvl" class="value">1</span></div>
        <div class="stat-group"><span class="label">Kills</span><span id="txt-kills" class="value">0</span></div>
    </div>
    <div id="combo-badge">
        <div style="font-size:8px;color:var(--primary);letter-spacing:3px;font-family:'Orbitron',sans-serif">COMBO</div>
        <div id="txt-combo" class="value" style="font-size:24px">x1</div>
    </div>
    <div id="boss-hud">
        <div id="boss-name">⚠ BOSS ⚠</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>
</div>

<div id="buff-bar"></div>
<div id="hp-container"><div id="hp-fill"></div></div>
<div id="hp-label">HP</div>
<div id="weapon-bar"></div>

<!-- Minimap -->
<div id="minimap">
    <canvas id="minimap-canvas" width="110" height="110"></canvas>
    <div id="minimap-label">RADAR</div>
</div>

<!-- Achievement popup -->
<div id="achievement-popup">
    <div class="ach-title">🏆 LOGRO DESBLOQUEADO</div>
    <div class="ach-name" id="ach-name"></div>
    <div class="ach-desc" id="ach-desc"></div>
</div>

<button id="pause-btn">⏸ PAUSA</button>

<!-- Mobile controls -->
<div id="mobile-ui">
    <div class="joystick-area" id="joy-base"><div id="stick"></div></div>
    <div class="action-btn" id="btn-burst">ULTRA<br>⚡</div>
</div>

<!-- START SCREEN -->
<div id="start-screen" class="overlay">
    <div class="title-main">☽ SHADOW SURVIVOR</div>
    <div class="title-sub">ETERNAL NIGHT EDITION</div>
    <div class="char-grid" id="char-selection"></div>
    <button class="btn-main" id="btn-start-game">⚔ &nbsp; COMBATIR</button>
    <div style="margin-top:14px;font-size:10px;color:#332233;letter-spacing:2px;font-family:'Orbitron',sans-serif">WASD / FLECHAS · ESPACIO: ULTRA</div>
</div>

<!-- LEVEL UP -->
<div id="levelup-screen" class="overlay">
    <div style="font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:6px;font-size:clamp(11px,3vw,14px);letter-spacing:5px;text-shadow:0 0 20px var(--accent)">⬆ SUBISTE DE NIVEL</div>
    <div id="txt-levelup-num" style="font-family:'Orbitron',sans-serif;color:#554466;font-size:11px;margin-bottom:20px;letter-spacing:3px">ELIGE UNA MEJORA</div>
    <div class="upgrade-container" id="upgrade-options"></div>
</div>

<!-- PAUSE SCREEN -->
<div id="pause-screen">
    <h2>⏸ PAUSA</h2>
    <div class="pause-stats" id="pause-stats"></div>
    <div class="pause-btns">
        <button class="btn-secondary" onclick="Game.togglePause()">▶ REANUDAR</button>
        <button class="btn-secondary" onclick="location.reload()">↺ REINICIAR</button>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="overlay">
    <div style="font-family:'Orbitron',sans-serif;color:var(--primary);font-size:clamp(22px,7vw,44px);font-weight:900;text-shadow:0 0 40px rgba(255,34,85,0.4)">💀 CAÍSTE</div>
    <div id="game-over-stats"></div>
    <button class="btn-main" onclick="location.reload()" style="margin-top:20px">⚔ REINTENTAR</button>
</div>

<!-- JS Modules (load order matters) -->
<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/entity.js"></script>
<script src="js/player.js"></script>
<script src="js/enemy.js"></script>
<script src="js/weapons.js"></script>
<script src="js/game.js"></script>
</body>
</html>

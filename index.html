<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHADOW SURVIVOR: ETERNAL NIGHT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2255;
            --secondary: #4466ff;
            --accent: #ffd700;
            --bg: #03010a;
            --panel: rgba(12, 8, 22, 0.95);
            --border: #3a1a4a;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body, html {
            width:100%; height:100%; overflow:hidden;
            background:var(--bg); font-family:'Rajdhani',sans-serif;
            user-select:none; -webkit-user-select:none;
        }
        /* touch-action SOLO en el canvas, no en body — en iOS bloquea clics en botones */
        canvas { display:block; touch-action:none; }

        /* ── HUD ── */
        #hud {
            position:fixed; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:10; color:#fff;
        }
        .xp-container {
            position:fixed; top:0; left:0; width:100%; height:8px;
            background:rgba(0,0,0,0.5); border-bottom:1px solid var(--border);
        }
        #xp-fill {
            height:100%; width:0%;
            background:linear-gradient(90deg, var(--secondary), #00d4ff);
            box-shadow:0 0 12px var(--secondary);
            transition:width 0.25s ease;
        }
        /* HP bar at bottom */
        #hp-container {
            position:fixed; bottom:0; left:0; width:100%; height:10px;
            background:rgba(0,0,0,0.6); border-top:1px solid var(--border); z-index:11;
        }
        #hp-fill {
            height:100%; width:100%;
            background:linear-gradient(90deg, #7a0020, #ff2255, #ff7766);
            box-shadow:0 0 10px #ff2255;
            transition:width 0.12s ease;
        }
        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            padding:clamp(12px,3vw,20px) clamp(20px,5vw,40px);
            background:linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
        }
        .stat-group { display:flex; flex-direction:column; align-items:center; }
        .label { font-size:11px; color:#664466; text-transform:uppercase; letter-spacing:2px; }
        .value { font-family:'Press Start 2P',cursive; font-size:clamp(12px,3vw,17px); color:var(--accent); }

        /* ── COMBO ── */
        #combo-badge {
            position:absolute; top:80px; right:20px;
            background:var(--panel); border:2px solid var(--primary);
            padding:8px 16px; transform:skewX(-10deg);
            display:none; flex-direction:column; align-items:flex-end;
        }

        /* ── BOSS BAR ── */
        #boss-hud {
            display:none; position:fixed; top:60px; left:50%; transform:translateX(-50%);
            width:min(480px,88vw); flex-direction:column; align-items:center; gap:5px; z-index:12;
        }
        #boss-name { color:var(--primary); font-size:11px; letter-spacing:3px; font-family:'Press Start 2P'; text-shadow:0 0 10px var(--primary); }
        #boss-bar-bg {
            width:100%; height:12px; background:rgba(0,0,0,0.85);
            border:1px solid var(--primary); box-shadow:0 0 14px rgba(255,34,85,0.5);
        }
        #boss-bar-fill {
            height:100%; width:100%;
            background:linear-gradient(90deg, #600020, var(--primary), #ff6688);
            transition:width 0.1s; box-shadow:0 0 8px var(--primary);
        }

        /* ── ACTIVE BUFFS ── */
        #buff-bar {
            position:fixed; top:12px; left:50%; transform:translateX(-50%);
            display:flex; gap:10px; pointer-events:none; z-index:11;
        }
        .buff-pill {
            background:var(--panel); border:1px solid #555;
            padding:4px 10px; font-size:11px; display:flex; gap:5px; align-items:center;
            font-family:'Rajdhani',sans-serif;
        }

        /* ── OVERLAYS ── */
        .overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.9);
            display:none; flex-direction:column; align-items:center; justify-content:center;
            z-index:1000; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            pointer-events:auto;
        }
        #start-screen { display:flex; }
        .char-grid {
            display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
            width:90%; max-width:560px; margin-top:24px;
        }
        .char-card {
            background:var(--panel); border:2px solid var(--border);
            padding:14px; border-radius:8px; cursor:pointer; transition:0.18s;
        }
        .char-card:hover, .char-card.selected { border-color:var(--primary); transform:translateY(-4px); box-shadow:0 0 18px rgba(255,34,85,0.3); }
        .char-card h3 { color:var(--accent); margin-bottom:4px; font-size:clamp(13px,3vw,16px); }
        .char-card p { font-size:12px; color:#886688; }
        .btn-main {
            margin-top:30px; padding:14px 48px;
            background:var(--primary); color:white; border:none;
            font-family:'Press Start 2P',cursive; font-size:clamp(12px,3vw,15px);
            cursor:pointer; box-shadow:0 0 20px var(--primary); border-radius:4px; transition:0.2s;
        }
        .btn-main:active { transform:scale(0.95); }

        /* ── LEVEL UP ── */
        .upgrade-container {
            display:flex; flex-direction:column; gap:12px;
            width:90%; max-width:440px;
        }
        .upgrade-item {
            background:#12091e; border:2px solid #331144;
            padding:18px 20px; border-radius:12px; display:flex; align-items:center;
            gap:18px; cursor:pointer; transition:0.18s; min-height:80px;
        }
        .upgrade-item:active, .upgrade-item:hover { border-color:var(--accent); background:#1e1030; }
        .upgrade-icon { font-size:36px; min-width:50px; text-align:center; }
        .upgrade-info h4 { color:var(--accent); font-size:clamp(14px,4vw,18px); text-transform:uppercase; }
        .upgrade-info p { color:#886688; font-size:13px; margin-top:3px; }

        /* ── MOBILE CONTROLS ── */
        #mobile-ui {
            position:fixed; bottom:0; left:0; width:100%; height:220px;
            pointer-events:none; z-index:50;
        }
        /* BUG FIX: joystick centered at bottom */
        .joystick-area {
            position:absolute; bottom:55px; left:50%; transform:translateX(-50%);
            width:130px; height:130px;
            background:rgba(255,34,85,0.04); border:2px solid rgba(255,34,85,0.18);
            border-radius:50%; pointer-events:auto;
        }
        #stick {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:54px; height:54px;
            background:rgba(255,34,85,0.25); border:2px solid rgba(255,34,85,0.5);
            border-radius:50%;
        }
        .action-btn {
            position:absolute; bottom:65px; right:40px;
            width:90px; height:90px;
            background:rgba(255,34,85,0.15); border:2px solid var(--primary);
            border-radius:50%; pointer-events:auto;
            display:flex; align-items:center; justify-content:center;
            font-family:'Press Start 2P'; color:white; font-size:10px; text-align:center;
            box-shadow:0 0 14px var(--primary); line-height:1.4;
        }
        #pause-btn {
            position:fixed; top:18px; right:16px;
            padding:6px 14px; background:rgba(0,0,0,0.55); border:1px solid #444;
            color:#aaa; border-radius:4px; pointer-events:auto; z-index:100;
            font-family:'Rajdhani'; font-size:14px; cursor:pointer;
        }

        /* ── GAME OVER ── */
        #game-over-stats {
            text-align:left; background:#0a0615; padding:18px 24px;
            border:1px solid var(--border); margin-top:18px; width:90%; max-width:400px;
        }
        .stat-row { display:flex; justify-content:space-between; border-bottom:1px solid #1a0a2a; padding:6px 0; font-size:15px; }
        .stat-row span:last-child { color:var(--accent); font-family:'Press Start 2P'; font-size:13px; }

        /* ── EFFECTS ── */
        #vignette {
            position:fixed; inset:0; pointer-events:none;
            background:radial-gradient(circle, transparent 38%, rgba(0,0,0,0.85) 115%); z-index:5;
        }
        #flash { position:fixed; inset:0; background:white; opacity:0; pointer-events:none; z-index:2000; transition:opacity 0.08s; }
        #dmg-flash { position:fixed; inset:0; background:rgba(200,0,40,0); pointer-events:none; z-index:6; transition:background 0.1s; }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<div id="vignette"></div>
<div id="flash"></div>
<div id="dmg-flash"></div>

<div id="hud">
    <div class="xp-container"><div id="xp-fill"></div></div>
    <div class="top-bar">
        <div class="stat-group">
            <span class="label">Time</span>
            <span id="txt-time" class="value">00:00</span>
        </div>
        <div class="stat-group">
            <span class="label">Level</span>
            <span id="txt-lvl" class="value">1</span>
        </div>
        <div class="stat-group">
            <span class="label">Kills</span>
            <span id="txt-kills" class="value">0</span>
        </div>
    </div>
    <div id="combo-badge">
        <div style="font-size:9px;color:var(--primary);letter-spacing:2px">COMBO</div>
        <div id="txt-combo" class="value" style="font-size:22px">x1</div>
    </div>
    <div id="boss-hud">
        <div id="boss-name">⚠ BOSS ⚠</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>
</div>
<div id="buff-bar"></div>
<div id="hp-container"><div id="hp-fill"></div></div>

<button id="pause-btn">⏸ PAUSA</button>

<div id="mobile-ui">
    <div class="joystick-area" id="joy-base"><div id="stick"></div></div>
    <div class="action-btn" id="btn-burst">ULTRA<br>⚡</div>
</div>

<div id="start-screen" class="overlay">
    <h1 style="color:var(--primary);font-family:'Press Start 2P';font-size:clamp(16px,5vw,34px);margin-bottom:6px;text-shadow:0 0 20px var(--primary)">SHADOW SURVIVOR</h1>
    <p style="color:#554455;letter-spacing:4px;font-size:13px">ETERNAL NIGHT EDITION</p>
    <div class="char-grid" id="char-selection"></div>
    <button class="btn-main" id="btn-start-game">⚔ COMBATIR</button>
</div>

<div id="levelup-screen" class="overlay">
    <h2 style="font-family:'Press Start 2P';color:var(--accent);margin-bottom:24px;font-size:clamp(14px,4vw,22px)">⬆ LEVEL UP</h2>
    <div class="upgrade-container" id="upgrade-options"></div>
</div>

<div id="gameover-screen" class="overlay">
    <h2 style="font-family:'Press Start 2P';color:var(--primary);font-size:clamp(22px,7vw,40px)">💀 CAÍSTE</h2>
    <div id="game-over-stats"></div>
    <button class="btn-main" onclick="location.reload()">⚔ REINTENTAR</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  MODULE-LEVEL CANVAS (fixes Enemy/Weapon class references)
// ═══════════════════════════════════════════════════════════════
let canvas; // Set in Game.init() — used by Enemy and Weapon classes

// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
    PARTICLE_LIMIT: 80,
    ENEMY_LIMIT: 120,
    IS_MOBILE: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent),
};

// ═══════════════════════════════════════════════════════════════
//  AUDIO ENGINE  (throttled to prevent oscillator flood)
// ═══════════════════════════════════════════════════════════════
const AudioEngine = {
    ctx: null,
    _lastHit: 0,
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { console.warn('Audio unavailable'); }
    },
    resume() { if (this.ctx?.state === 'suspended') this.ctx.resume(); },
    playTone(freq, type, duration, vol = 0.07) {
        if (!this.ctx) return;
        try {
            const osc  = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        } catch(e) {}
    },
    // Throttled: max ~15 hit sounds/sec to avoid oscillator flood
    sfxHit() {
        const now = Date.now();
        if (now - this._lastHit < 65) return;
        this._lastHit = now;
        this.playTone(140 + Math.random()*60, 'square', 0.08, 0.04);
    },
    sfxLevel() {
        this.playTone(440, 'triangle', 0.4, 0.09);
        setTimeout(() => this.playTone(880, 'triangle', 0.4, 0.09), 110);
    },
    sfxKill()    { this.playTone(90, 'sine', 0.15, 0.07); },
    sfxPowerup() { this.playTone(600, 'sawtooth', 0.3, 0.09); },
    sfxBoss()    { this.playTone(55, 'sawtooth', 1.0, 0.14); },
};

// ═══════════════════════════════════════════════════════════════
//  MATH UTILS
// ═══════════════════════════════════════════════════════════════
const M = {
    dist:    (x1,y1,x2,y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2),
    lerp:    (a,b,t) => a + (b-a)*t,
    clamp:   (v,mn,mx) => Math.max(mn, Math.min(mx, v)),
    rand:    (mn,mx) => Math.random()*(mx-mn)+mn,
    randInt: (mn,mx) => Math.floor(Math.random()*(mx-mn+1))+mn,
    angle:   (x1,y1,x2,y2) => Math.atan2(y2-y1, x2-x1),
    norm:    (dx,dy) => { const d = Math.hypot(dx,dy)||1; return {x:dx/d, y:dy/d}; },
};

// ═══════════════════════════════════════════════════════════════
//  CHARACTERS
// ═══════════════════════════════════════════════════════════════
const CHARACTERS = [
    { id:'warrior', name:'Alaric', icon:'⚔️', hp:150, speed:200, weapon:'Whip',      desc:'Más vida. Látigo circular perforante.' },
    { id:'mage',    name:'Zale',   icon:'🔮', hp:80,  speed:175, weapon:'MagicWand', desc:'Dispara proyectiles teledirigidos.' },
    { id:'rogue',   name:'Kael',   icon:'🗡️', hp:100, speed:250, weapon:'Knife',     desc:'Extremadamente rápido con dagas.' },
    { id:'cleric',  name:'Elora',  icon:'✨', hp:120, speed:185, weapon:'Bible',      desc:'Aura giratoria defensiva.' },
];

// ═══════════════════════════════════════════════════════════════
//  UPGRADES
// ═══════════════════════════════════════════════════════════════
const UPGRADES_DB = {
    'Whip':      { name:'Látigo',    icon:'〰️', desc:'Ataque horizontal perforante.',      type:'weapon' },
    'MagicWand': { name:'Varita',    icon:'🪄', desc:'Proyectil al enemigo más cercano.',   type:'weapon' },
    'Knife':     { name:'Daga',      icon:'🔪', desc:'Dagas veloces en tu dirección.',      type:'weapon' },
    'Bible':     { name:'Orbe',      icon:'📖', desc:'Orbe que gira y daña alrededor.',     type:'weapon' },
    'Garlic':    { name:'Aura',      icon:'🧄', desc:'Daño constante cerca del jugador.',   type:'weapon' },
    'Boots':     { name:'Botas',     icon:'👟', desc:'Velocidad de movimiento +12%.',        type:'stat'   },
    'Spinach':   { name:'Espinaca',  icon:'🥬', desc:'Daño total +20%.',                    type:'stat'   },
    'Armor':     { name:'Armadura',  icon:'🛡️', desc:'Reduce daño recibido en 2.',          type:'stat'   },
    'Magnet':    { name:'Imán',      icon:'🧲', desc:'Radio de recogida de gemas +30%.',    type:'stat'   },
    'Regen':     { name:'Regen',     icon:'💚', desc:'Regenera 1 HP/segundo.',              type:'stat'   },
};

// ═══════════════════════════════════════════════════════════════
//  ENTITY BASE
// ═══════════════════════════════════════════════════════════════
class Entity {
    constructor(x, y, r, hp, color) {
        this.x=x; this.y=y; this.r=r;
        this.maxHp=hp; this.hp=hp;
        this.color=color;
        this.flash=0; this.dead=false;
    }
    takeDamage(amt) {
        if (this.dead) return;
        this.hp -= amt;
        this.flash = 0.12;
        // sfxHit called externally only for enemies to avoid garlic flood
        if (this.hp <= 0) this.die();
    }
    die() { this.dead = true; }
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════════
class Player extends Entity {
    constructor(charData) {
        super(0, 0, 15, charData.hp, '#fff');
        this.charId    = charData.id;
        this.baseSpeed = charData.speed;
        this.speed     = this.baseSpeed;
        this.pickupRange = 100;
        this.xp=0; this.nextXp=50; this.level=1;
        this.weapons   = [];
        this.stats     = { damageMult:1, reduction:0, regen:0 };
        this.iframe    = 0;
        this.dir       = { x:0, y:1 };
        this.moving    = false;
        // BUG FIX: initialized active buffs
        this.activeBuffs = { shield:0, speed:0, damage:0 };
        this.addWeapon(charData.weapon);
    }
    addWeapon(id) {
        const existing = this.weapons.find(w => w.id === id);
        if (existing) { existing.levelUp(); }
        else { const cls = WeaponFactory[id]; if (cls) this.weapons.push(new cls(this)); }
    }
    applyStatUpgrade(id) {
        switch(id) {
            case 'Boots':   this.speed *= 1.12; break;
            case 'Spinach': this.stats.damageMult += 0.20; break;
            case 'Armor':   this.stats.reduction  += 2;    break;
            case 'Magnet':  this.pickupRange *= 1.3;        break;
            case 'Regen':   this.stats.regen  += 1;         break;
        }
    }
    update(dt, input) {
        if (this.iframe > 0) this.iframe -= dt;
        // Regen
        if (this.stats.regen > 0) this.hp = Math.min(this.maxHp, this.hp + this.stats.regen * dt);
        // Active buff timers
        for (const k of Object.keys(this.activeBuffs))
            if (this.activeBuffs[k] > 0) this.activeBuffs[k] -= dt;
        // Movement with speed buff
        const speedMult = this.activeBuffs.speed > 0 ? 1.85 : 1;
        if (input.x !== 0 || input.y !== 0) {
            this.x += input.x * this.speed * speedMult * dt;
            this.y += input.y * this.speed * speedMult * dt;
            this.dir.x = input.x; this.dir.y = input.y;
            this.moving = true;
        } else { this.moving = false; }
        this.weapons.forEach(w => w.update(dt));
    }
    draw(ctx, off) {
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        // Invincibility flicker
        if (this.iframe > 0 && Math.floor(Date.now()/55)%2 === 0) ctx.globalAlpha = 0.28;
        // Shield buff glow
        if (this.activeBuffs.shield > 0) {
            ctx.strokeStyle = 'rgba(80,180,255,0.7)';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.arc(0, 0, this.r+8, 0, Math.PI*2); ctx.stroke();
            ctx.shadowBlur = 0;
        }
        // Damage buff glow
        if (this.activeBuffs.damage > 0) {
            ctx.strokeStyle = 'rgba(255,80,80,0.6)';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, this.r+5, 0, Math.PI*2); ctx.stroke();
        }
        // Body
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#ff2255';
        ctx.shadowBlur = CONFIG.IS_MOBILE ? 8 : 15;
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        // Eyes
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#220a30';
        const ex = this.dir.x * 5, ey = this.dir.y * 5;
        ctx.beginPath(); ctx.arc(ex-3, ey-2, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+3, ey-2, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════════════
//  ENEMY
// ═══════════════════════════════════════════════════════════════
class Enemy extends Entity {
    constructor(x, y, data, diffMult) {
        super(x, y, data.r, data.hp * diffMult, data.color);
        this.type        = data.type;
        this.speed       = data.speed * (0.9 + Math.random()*0.2) * Math.min(diffMult, 2);
        this.baseSpeed   = this.speed;
        this.dmg         = data.dmg * diffMult;
        this.xpValue     = data.xp;
        this.behaviorTimer = 0;
        this.swingAngle  = 0;
        this.isBoss      = data.isBoss || false;
        this.patternTimer= 0;
        this.patternPhase= 0;
        this.charging    = false;
        this.chargeVx    = 0; this.chargeVy = 0; this.chargeDur = 0;
        this.shootTimer  = 1 + Math.random()*2;
        this.knockback   = { x:0, y:0 };
    }

    update(dt, px, py) {
        if (this.flash > 0) this.flash -= dt;
        // Knockback decay
        this.x += this.knockback.x * dt;
        this.y += this.knockback.y * dt;
        this.knockback.x *= 0.88; this.knockback.y *= 0.88;

        const dist = M.dist(this.x, this.y, px, py);
        const ang  = M.angle(this.x, this.y, px, py);

        switch(this.type) {
            case 'boss':
                this._updateBoss(dt, px, py, dist, ang);
                break;
            case 'swarm':
                // Zigzag: add perpendicular oscillation to chase direction
                this.swingAngle += dt * 5;
                const swing = Math.sin(this.swingAngle) * 1.1;
                this.x += (Math.cos(ang) + Math.cos(ang + Math.PI/2)*swing) * this.speed * dt;
                this.y += (Math.sin(ang) + Math.sin(ang + Math.PI/2)*swing) * this.speed * dt;
                break;
            case 'ranged':
                // Keep distance ~200px, strafe, shoot periodically
                const keepDist = 200;
                if (dist < keepDist - 25) {
                    this.x -= Math.cos(ang) * this.speed * 0.7 * dt;
                    this.y -= Math.sin(ang) * this.speed * 0.7 * dt;
                } else if (dist > keepDist + 25) {
                    this.x += Math.cos(ang) * this.speed * 0.6 * dt;
                    this.y += Math.sin(ang) * this.speed * 0.6 * dt;
                } else {
                    // Strafe perpendicular
                    this.x += -Math.sin(ang) * this.speed * 0.5 * dt;
                    this.y +=  Math.cos(ang) * this.speed * 0.5 * dt;
                }
                this.shootTimer -= dt;
                if (this.shootTimer <= 0) {
                    this.shootTimer = 2.5 + Math.random();
                    Game.enemyProjectiles.push({
                        x:this.x, y:this.y,
                        vx: Math.cos(ang)*2.0, vy: Math.sin(ang)*2.0,
                        r:7, dmg:8, life:280, color:this.color
                    });
                }
                break;
            case 'exploder':
                // BUG FIX: speed was growing every frame → cap with baseSpeed
                if (dist < 120) this.speed = Math.min(this.baseSpeed * 2.2, this.speed + this.baseSpeed * dt);
                else            this.speed = Math.max(this.baseSpeed, this.speed - this.baseSpeed * dt * 0.5);
                this.x += Math.cos(ang) * this.speed * dt;
                this.y += Math.sin(ang) * this.speed * dt;
                break;
            case 'charger':
                // BUG FIX: replaced broken modulo timer with proper phase system
                this.behaviorTimer += dt;
                if (this.charging) {
                    this.x += this.chargeVx * dt;
                    this.y += this.chargeVy * dt;
                    this.chargeDur -= dt;
                    if (this.chargeDur <= 0) this.charging = false;
                } else if (this.behaviorTimer > 3.0) {
                    this.behaviorTimer = 0;
                    this.charging = true;
                    this.chargeVx = Math.cos(ang) * this.speed * 4;
                    this.chargeVy = Math.sin(ang) * this.speed * 4;
                    this.chargeDur = 0.35;
                } else {
                    this.x += Math.cos(ang) * this.speed * 0.5 * dt;
                    this.y += Math.sin(ang) * this.speed * 0.5 * dt;
                }
                break;
            default: // chase
                this.x += Math.cos(ang) * this.speed * dt;
                this.y += Math.sin(ang) * this.speed * dt;
        }
    }

    _updateBoss(dt, px, py, dist, ang) {
        this.patternTimer += dt;
        if (this.charging) {
            this.x += this.chargeVx * dt;
            this.y += this.chargeVy * dt;
            this.chargeDur -= dt;
            if (this.chargeDur <= 0) { this.charging = false; }
        } else {
            this.x += Math.cos(ang) * this.speed * dt;
            this.y += Math.sin(ang) * this.speed * dt;
        }
        if (this.patternTimer >= 4.0) {
            this.patternTimer = 0;
            this.patternPhase = (this.patternPhase + 1) % 2;
            if (this.patternPhase === 0) {
                // Charge
                this.charging = true;
                this.chargeVx = Math.cos(ang) * 600;
                this.chargeVy = Math.sin(ang) * 600;
                this.chargeDur = 0.38;
                Game.shake = 8;
            } else {
                // 360° burst — 14 slow projectiles
                const N = 14;
                for (let i=0; i<N; i++) {
                    const a = (Math.PI*2/N)*i;
                    Game.enemyProjectiles.push({
                        x:this.x, y:this.y,
                        vx:Math.cos(a)*2.8, vy:Math.sin(a)*2.8,
                        r:9, dmg:20, life:260, color:'#ff1144'
                    });
                }
                Game.shake = 12;
            }
        }
    }

    draw(ctx, off) {
        const sx = this.x - off.x + canvas.width/2;
        const sy = this.y - off.y + canvas.height/2;
        if (sx < -60 || sx > canvas.width+60 || sy < -60 || sy > canvas.height+60) return;

        ctx.save();
        // BUG FIX: replaced ctx.filter (slow) with simple color swap
        const col = this.flash > 0 ? '#ffffff' : this.color;
        ctx.fillStyle = col;
        ctx.shadowColor = this.isBoss ? '#ff0033' : this.color;
        ctx.shadowBlur  = CONFIG.IS_MOBILE ? 6 : (this.isBoss ? 22 : 10);

        ctx.beginPath();
        if (this.type === 'charger') {
            this._drawStar(ctx, sx, sy, 5, this.r, this.r*0.42);
        } else if (this.type === 'exploder') {
            ctx.rect(sx-this.r, sy-this.r, this.r*2, this.r*2);
        } else {
            ctx.arc(sx, sy, this.r, 0, Math.PI*2);
        }
        ctx.fill();

        if (this.isBoss) {
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = '#ff6688'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(sx, sy, this.r+10, 0, Math.PI*2); ctx.stroke();
        }

        // HP bar (non-boss only)
        if (!this.isBoss && this.hp < this.maxHp) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#200010';
            ctx.fillRect(sx-this.r, sy-this.r-8, this.r*2, 4);
            ctx.fillStyle = this.color;
            ctx.fillRect(sx-this.r, sy-this.r-8, this.r*2*(this.hp/this.maxHp), 4);
        }
        ctx.restore();
    }

    _drawStar(ctx, cx, cy, spikes, outer, inner) {
        let rot = -Math.PI/2; const step = Math.PI/spikes;
        ctx.beginPath(); ctx.moveTo(cx, cy-outer);
        for (let i=0; i<spikes; i++) {
            ctx.lineTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer); rot+=step;
            ctx.lineTo(cx+Math.cos(rot)*inner, cy+Math.sin(rot)*inner); rot+=step;
        }
        ctx.closePath();
    }

    // Called when exploder dies
    explode() {
        const RADIUS = 90;
        Game.enemies.forEach(e => {
            if (e !== this && M.dist(this.x, this.y, e.x, e.y) < RADIUS) {
                e.hp -= 30;
                e.flash = 0.2;
            }
        });
        // Also damage player
        if (M.dist(this.x, this.y, Game.player.x, Game.player.y) < RADIUS && Game.player.iframe <= 0) {
            Game.player.hp -= 25;
            Game.player.iframe = 0.5;
            Game.shake = 10;
        }
        Game.spawnParticle(this.x, this.y, '#00ff88', 16);
        // Shockwave ring via enemy projectile trick
        for (let i=0; i<8; i++) {
            const a = (Math.PI*2/8)*i;
            Game.enemyProjectiles.push({
                x:this.x, y:this.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5,
                r:5, dmg:0, life:20, color:'#00ff88'
            });
        }
    }
}

//  WEAPON SYSTEM
// ═══════════════════════════════════════════════════════════════
class Weapon {
    constructor(player, id, baseDmg, cooldown) {
        this.player=player; this.id=id; this.level=1;
        this.baseDmg=baseDmg; this.cooldown=cooldown; this.timer=0;
    }
    levelUp() { this.level++; this.baseDmg *= 1.2; this.cooldown = Math.max(this.cooldown*0.85, 0.15); }
    get dmg() {
        const damageBuff = this.player.activeBuffs.damage > 0 ? 2.0 : 1;
        return this.baseDmg * this.player.stats.damageMult * damageBuff;
    }
}

const WeaponFactory = {
    'Whip': class extends Weapon {
        constructor(p) { super(p,'Whip',28,1.2); }
        update(dt) {
            this.timer -= dt;
            if (this.timer <= 0) {
                this.timer = this.cooldown;
                const dir = this.player.dir.x >= 0 ? 1 : -1;
                Game.projectiles.push({ type:'whip', x:this.player.x, y:this.player.y, w:180+(this.level*20), h:40, dir, life:0.2, dmg:this.dmg });
            }
        }
    },
    'MagicWand': class extends Weapon {
        constructor(p) { super(p,'MagicWand',18,0.75); }
        update(dt) {
            this.timer -= dt;
            if (this.timer <= 0 && Game.enemies.length > 0) {
                this.timer = this.cooldown;
                const target = Game.getClosestEnemy(this.player.x, this.player.y);
                if (!target) return;
                const ang = M.angle(this.player.x, this.player.y, target.x, target.y);
                Game.projectiles.push({ type:'bolt', x:this.player.x, y:this.player.y, vx:Math.cos(ang)*500, vy:Math.sin(ang)*500, r:6, life:2, dmg:this.dmg, color:'#4466ff' });
            }
        }
    },
    'Knife': class extends Weapon {
        constructor(p) { super(p,'Knife',14,0.48); }
        update(dt) {
            this.timer -= dt;
            if (this.timer <= 0) {
                this.timer = this.cooldown;
                // BUG FIX: always fire (toward nearest enemy OR facing direction)
                const target = Game.getClosestEnemy(this.player.x, this.player.y);
                const ang = target
                    ? M.angle(this.player.x, this.player.y, target.x, target.y)
                    : M.angle(0, 0, this.player.dir.x, this.player.dir.y);
                for (let k=0; k<this.level; k++) {
                    const spread = (k - (this.level-1)/2) * 0.15;
                    Game.projectiles.push({ type:'knife', x:this.player.x, y:this.player.y, vx:Math.cos(ang+spread)*700, vy:Math.sin(ang+spread)*700, r:5, life:1.5, dmg:this.dmg, ang:ang+spread });
                }
            }
        }
    },
    'Bible': class extends Weapon {
        constructor(p) { super(p,'Bible',12,3); this.angle=0; this.orbitR=90; }
        update(dt) {
            this.angle += dt * (3.5 + this.level*0.3);
            this.orbitR = 90 + this.level*8;
            const bx = this.player.x + Math.cos(this.angle)*this.orbitR;
            const by = this.player.y + Math.sin(this.angle)*this.orbitR;
            Game.enemies.forEach(e => {
                if (M.dist(bx, by, e.x, e.y) < e.r+18) {
                    e.takeDamage(this.dmg * dt * 5);
                    e.knockback.x = Math.cos(this.angle)*180;
                    e.knockback.y = Math.sin(this.angle)*180;
                }
            });
        }
        draw(ctx, off) {
            const sx = (this.player.x + Math.cos(this.angle)*this.orbitR) - off.x + canvas.width/2;
            const sy = (this.player.y + Math.sin(this.angle)*this.orbitR) - off.y + canvas.height/2;
            ctx.save();
            ctx.fillStyle = '#eeddff';
            ctx.shadowColor = '#aa88ff'; ctx.shadowBlur = CONFIG.IS_MOBILE ? 5 : 12;
            ctx.fillRect(sx-9, sy-13, 18, 26);
            ctx.restore();
        }
    },
    'Garlic': class extends Weapon {
        constructor(p) { super(p,'Garlic',6,0.1); this.auraR=70; }
        update(dt) {
            this.auraR = 70 + this.level*12;
            // Throttled: only process every other frame to avoid audio flood
            if (Math.random() > 0.5) return;
            Game.enemies.forEach(e => {
                if (M.dist(this.player.x, this.player.y, e.x, e.y) < e.r+this.auraR) {
                    e.hp -= this.dmg * dt * 8;
                    e.flash = Math.max(e.flash, 0.05);
                }
            });
        }
        draw(ctx, off) {
            ctx.save();
            ctx.globalAlpha = 0.12 + Math.sin(Date.now()*0.003)*0.05;
            ctx.strokeStyle = 'rgba(140,255,140,0.6)';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#88ff88'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, this.auraR, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    }
};

//  GAME CONTROLLER
// ═══════════════════════════════════════════════════════════════
const Game = {
    canvas:null, ctx:null,
    player:null,
    enemies:[], projectiles:[], gems:[], particles:[], decorations:[],
    texts:[], enemyProjectiles:[], powerUps:[],
    currentBoss:null,
    state:'START',
    kills:0, time:0, combo:0, comboTimer:0,
    shake:0,
    difficulty:1,
    lastMinute:0,
    powerUpTimer:0,
    // BUG FIX: all input axes initialized
    input:{ x:0, y:0, up:0, down:0, left:0, right:0 },
    joyId:null, joyStart:{x:0,y:0},
    selectedChar: null,
    lastTime_loop: 0,

    init() {
        canvas = document.getElementById('game');
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha:false });
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initUI();
        this.initDecorations();
        requestAnimationFrame(t => this.loop(t));
    },

    resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    },

    initUI() {
        // Character cards
        const grid = document.getElementById('char-selection');
        CHARACTERS.forEach(c => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `<h3>${c.icon} ${c.name}</h3><p>${c.desc}</p>`;
            const selectChar = () => {
                document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
                card.classList.add('selected');
                this.selectedChar = c;
            };
            card.onclick = selectChar;
            // iOS fix: touchend on divs
            card.addEventListener('touchend', e => { e.preventDefault(); selectChar(); });
            grid.appendChild(card);
        });
        this.selectedChar = CHARACTERS[0];
        grid.children[0].classList.add('selected');

        document.getElementById('btn-start-game').onclick = () => this.start();
        // iOS Safari fix: también escuchar touchend en todos los botones de menú
        document.getElementById('btn-start-game').addEventListener('touchend', e => {
            e.preventDefault();
            this.start();
        });
        document.getElementById('pause-btn').onclick = () => this.togglePause();
        document.getElementById('pause-btn').addEventListener('touchend', e => {
            e.preventDefault();
            this.togglePause();
        });
        // iOS: resume AudioContext en cualquier toque en la pantalla
        document.addEventListener('touchstart', () => AudioEngine.resume(), { once: true });

        // ── JOYSTICK (center-bottom) ──
        const joyBase = document.getElementById('joy-base');
        joyBase.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.changedTouches[0];
            this.joyId = t.identifier;
            const rect = joyBase.getBoundingClientRect();
            this.joyStart = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
        }, { passive:false });

        window.addEventListener('touchmove', e => {
            if (this.joyId === null) return;
            for (const t of e.changedTouches) {
                if (t.identifier === this.joyId) {
                    const dx = t.clientX - this.joyStart.x;
                    const dy = t.clientY - this.joyStart.y;
                    const dist = Math.hypot(dx, dy);
                    const max  = 65;
                    this.input.x = dx / Math.max(dist, max);
                    this.input.y = dy / Math.max(dist, max);
                    const stick = document.getElementById('stick');
                    const nx = M.clamp(dx, -max, max);
                    const ny = M.clamp(dy, -max, max);
                    stick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
                }
            }
        });

        window.addEventListener('touchend', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === this.joyId) {
                    this.joyId = null;
                    this.input.x = 0; this.input.y = 0;
                    document.getElementById('stick').style.transform = 'translate(-50%,-50%)';
                }
            }
        });

        // ── BURST BUTTON (BUG FIX: was never wired up) ──
        document.getElementById('btn-burst').addEventListener('touchstart', e => {
            e.preventDefault();
            this.triggerBurst();
        }, { passive:false });
        document.getElementById('btn-burst').addEventListener('click', () => this.triggerBurst());

        // ── KEYBOARD ──
        window.addEventListener('keydown', e => this.handleKey(e, true));
        window.addEventListener('keyup',   e => this.handleKey(e, false));
        // Space = burst
        window.addEventListener('keydown', e => { if (e.key === ' ') this.triggerBurst(); });
    },

    handleKey(e, isDown) {
        const v = isDown ? 1 : 0;
        if (e.key==='ArrowUp'||e.key==='w'||e.key==='W')    this.input.up    = v;
        if (e.key==='ArrowDown'||e.key==='s'||e.key==='S')  this.input.down  = v;
        if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  this.input.left  = v;
        if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') this.input.right = v;
        // Recalculate normalized vector
        let kx = (this.input.right||0) - (this.input.left||0);
        let ky = (this.input.down||0)  - (this.input.up||0);
        const mag = Math.hypot(kx, ky);
        if (mag > 0) { this.input.x = kx/mag; this.input.y = ky/mag; }
        else if (this.joyId === null) { this.input.x = 0; this.input.y = 0; }
    },

    // Ultra burst: 360° shot from player
    triggerBurst() {
        if (this.state !== 'PLAY' || !this.player) return;
        const N = 16;
        for (let i=0; i<N; i++) {
            const a = (Math.PI*2/N)*i;
            this.projectiles.push({
                type:'bolt', x:this.player.x, y:this.player.y,
                vx:Math.cos(a)*480, vy:Math.sin(a)*480,
                r:7, life:1.2, dmg:this.player.stats.damageMult*30 * (this.player.activeBuffs.damage>0?2:1),
                color:'#ffd700'
            });
        }
        this.shake = 6;
        AudioEngine.sfxLevel();
    },

    start() {
        AudioEngine.init();
        AudioEngine.resume();
        this.player = new Player(this.selectedChar);
        this.enemies=[]; this.projectiles=[]; this.gems=[]; this.particles=[];
        this.texts=[]; this.enemyProjectiles=[]; this.powerUps=[]; this.currentBoss=null;
        this.kills=0; this.time=0; this.difficulty=1; this.lastMinute=0;
        this.combo=0; this.comboTimer=0; this.shake=0; this.powerUpTimer=0;
        this.state='PLAY';
        document.getElementById('start-screen').style.display='none';
        document.getElementById('boss-hud').style.display='none';
        AudioEngine.sfxPowerup();
    },

    togglePause() {
        if (this.state==='PLAY')  this.state='PAUSE';
        else if (this.state==='PAUSE') this.state='PLAY';
        document.getElementById('pause-btn').textContent = this.state==='PAUSE' ? '▶ REANUDAR' : '⏸ PAUSA';
    },

    initDecorations() {
        for (let i=0; i<120; i++) {
            this.decorations.push({
                x: M.rand(-3000,3000), y: M.rand(-3000,3000),
                type: Math.random()>0.5 ? 'rock' : 'crystal',
                size: M.rand(8,28), hue: M.randInt(240,300)
            });
        }
    },

    getClosestEnemy(x, y) {
        let closest=null, minDist=Infinity;
        for (const e of this.enemies) {
            const d = M.dist(x,y,e.x,e.y);
            if (d<minDist) { minDist=d; closest=e; }
        }
        return closest;
    },

    spawnEnemy(isBoss=false) {
        const angle = Math.random()*Math.PI*2;
        const dist  = Math.max(canvas.width, canvas.height)*0.62;
        const x = this.player.x + Math.cos(angle)*dist;
        const y = this.player.y + Math.sin(angle)*dist;

        if (isBoss) {
            const bossData = { type:'boss', hp:600, speed:140, r:30, color:'#ff1144', xp:200, dmg:35, isBoss:true };
            const e = new Enemy(x, y, bossData, this.difficulty);
            this.enemies.push(e);
            this.currentBoss = e;
            const bh = document.getElementById('boss-hud');
            bh.style.display = 'flex';
            document.getElementById('boss-name').textContent = `⚠ ANCIENT HORROR — MINUTO ${this.lastMinute} ⚠`;
            document.getElementById('boss-bar-fill').style.width = '100%';
            this.shake = 14;
            AudioEngine.sfxBoss();
            return;
        }

        const types = [
            { type:'chase',    hp:35,  speed:110, r:11, color:'#8844ff', xp:8,  dmg:8  },
            { type:'swarm',    hp:20,  speed:130, r:9,  color:'#ff44aa', xp:5,  dmg:6  },
            { type:'ranged',   hp:40,  speed:80,  r:12, color:'#44aaff', xp:12, dmg:10 },
            { type:'charger',  hp:50,  speed:95,  r:14, color:'#ffaa00', xp:15, dmg:14 },
            { type:'exploder', hp:65,  speed:55,  r:18, color:'#00ff88', xp:25, dmg:20 },
        ];
        let pool = [types[0], types[0], types[1]];
        if (this.time > 30)  pool.push(types[1], types[2]);
        if (this.time > 60)  pool.push(types[2], types[3]);
        if (this.time > 120) pool.push(types[4]);

        const data = pool[M.randInt(0, pool.length-1)];
        this.enemies.push(new Enemy(x, y, data, this.difficulty));
    },

    spawnParticle(x, y, color, count=6) {
        if (this.particles.length > CONFIG.PARTICLE_LIMIT) return;
        for (let i=0; i<count; i++) {
            const a = Math.random()*Math.PI*2;
            const s = 1.5 + Math.random()*5;
            this.particles.push({
                x, y, color,
                vx: Math.cos(a)*s, vy: Math.sin(a)*s - Math.random()*1.5,
                gravity: 0.1 + Math.random()*0.08,
                friction: 0.91 + Math.random()*0.04,
                life:0.6+Math.random()*0.5, maxLife:1.1, r:2+Math.random()*3
            });
        }
    },

    spawnText(x, y, value, isCrit=false) {
        this.texts.push({
            x, y,
            text: isCrit ? `✦${value}` : `${value}`,
            life:1.0, maxLife:1.0,
            vy: -(0.9 + Math.random()*0.5),
            vx: (Math.random()-0.5)*0.6,
            curve: (Math.random()-0.5)*0.025,
            isCrit
        });
    },

    spawnPowerUp(x, y) {
        const types = ['shield','speed','damage'];
        const colors = { shield:'#44aaff', speed:'#44ff88', damage:'#ff4444' };
        const icons  = { shield:'🛡', speed:'⚡', damage:'🔥' };
        const t = types[M.randInt(0, types.length-1)];
        this.powerUps.push({ x, y, type:t, color:colors[t], icon:icons[t], r:14, pulse:0 });
    },

    triggerLevelUp() {
        this.state = 'LEVELUP';
        AudioEngine.sfxLevel();
        // Flash white on level up
        const flash = document.getElementById('flash');
        flash.style.transition = 'opacity 0s';
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.transition='opacity 0.15s'; flash.style.opacity='0'; }, 80);

        const container = document.getElementById('upgrade-options');
        container.innerHTML = '';
        const keys = Object.keys(UPGRADES_DB).sort(()=>Math.random()-0.5).slice(0,3);
        keys.forEach(k => {
            const up  = UPGRADES_DB[k];
            const div = document.createElement('div');
            div.className = 'upgrade-item';
            div.innerHTML = `<div class="upgrade-icon">${up.icon}</div>
                <div class="upgrade-info"><h4>${up.name}</h4><p>${up.desc}</p></div>`;
            const applyUpgrade = () => {
                if (up.type==='weapon') this.player.addWeapon(k);
                else this.player.applyStatUpgrade(k);
                this.state = 'PLAY';
                document.getElementById('levelup-screen').style.display = 'none';
            };
            div.onclick = applyUpgrade;
            // iOS fix
            div.addEventListener('touchend', e => { e.preventDefault(); applyUpgrade(); });
            container.appendChild(div);
        });
        document.getElementById('levelup-screen').style.display = 'flex';
    },

    updateHUD() {
        const p = this.player;
        document.getElementById('xp-fill').style.width  = (p.xp/p.nextXp*100)+'%';
        document.getElementById('hp-fill').style.width  = Math.max(0, p.hp/p.maxHp*100)+'%';
        document.getElementById('txt-lvl').textContent  = p.level;
        document.getElementById('txt-kills').textContent= this.kills;
        const m = Math.floor(this.time/60), s = Math.floor(this.time%60);
        document.getElementById('txt-time').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        // Combo badge
        const badge = document.getElementById('combo-badge');
        if (this.combo > 4) {
            badge.style.display = 'flex';
            document.getElementById('txt-combo').textContent = 'x'+this.combo;
        } else {
            badge.style.display = 'none';
        }
        // Boss bar
        if (this.currentBoss && !this.currentBoss.dead) {
            document.getElementById('boss-bar-fill').style.width = (this.currentBoss.hp/this.currentBoss.maxHp*100)+'%';
        } else if (this.currentBoss && this.currentBoss.dead) {
            document.getElementById('boss-hud').style.display = 'none';
            this.currentBoss = null;
        }
        // Buff bar
        const buffBar = document.getElementById('buff-bar');
        buffBar.innerHTML = '';
        const buffData = { shield:{ icon:'🛡', color:'#44aaff' }, speed:{ icon:'⚡', color:'#44ff88' }, damage:{ icon:'🔥', color:'#ff4444' }};
        for (const [k, v] of Object.entries(p.activeBuffs)) {
            if (v > 0) {
                const pill = document.createElement('div');
                pill.className='buff-pill';
                pill.style.borderColor = buffData[k].color;
                pill.style.color = buffData[k].color;
                pill.textContent = `${buffData[k].icon} ${v.toFixed(1)}s`;
                buffBar.appendChild(pill);
            }
        }
    },

    update(dt) {
        if (this.state !== 'PLAY') return;
        this.time       += dt;
        this.difficulty  = 1 + (this.time/60)*0.22;

        // ── Minute boss spawn ──
        const curMin = Math.floor(this.time/60);
        if (curMin > this.lastMinute) {
            this.lastMinute = curMin;
            this.spawnEnemy(true);
        }

        // ── Combo decay ──
        if (this.comboTimer > 0) {
            this.comboTimer -= dt;
            if (this.comboTimer <= 0) this.combo = 0;
        }

        // ── Player ──
        this.player.update(dt, this.input);

        // ── Enemy spawn ──
        if (this.enemies.length < CONFIG.ENEMY_LIMIT && Math.random() < 0.04 * this.difficulty) {
            this.spawnEnemy();
        }

        // ── Power-up spawn ──
        this.powerUpTimer += dt;
        if (this.powerUpTimer > 12) {
            this.powerUpTimer = 0;
            const a = Math.random()*Math.PI*2, d = M.rand(150,320);
            this.spawnPowerUp(this.player.x+Math.cos(a)*d, this.player.y+Math.sin(a)*d);
        }

        // ── Power-up collection ──
        for (let i=this.powerUps.length-1; i>=0; i--) {
            const pu = this.powerUps[i];
            pu.pulse += dt*3;
            if (M.dist(this.player.x, this.player.y, pu.x, pu.y) < this.player.r+pu.r+8) {
                this.player.activeBuffs[pu.type] = (pu.type==='shield'?5 : pu.type==='speed'?4 : 6);
                AudioEngine.sfxPowerup();
                this.spawnParticle(pu.x, pu.y, pu.color, 10);
                this.powerUps.splice(i,1);
            }
        }

        // ── Screen shake decay ──
        if (this.shake > 0) this.shake *= 0.88;

        // ── Enemy update + player collision ──
        for (let i=this.enemies.length-1; i>=0; i--) {
            const e = this.enemies[i];
            e.update(dt, this.player.x, this.player.y);

            const d = M.dist(this.player.x, this.player.y, e.x, e.y);
            if (d < e.r+this.player.r && this.player.iframe <= 0) {
                if (this.player.activeBuffs.shield > 0) {
                    // Shield absorbs hit
                    this.player.activeBuffs.shield = 0;
                    this.shake = 4;
                } else {
                    const dmg = Math.max(1, e.dmg*dt*4 - this.player.stats.reduction);
                    this.player.hp -= dmg;
                    this.player.iframe = 0.4;
                    this.shake = 7;
                    // Red flash
                    const df = document.getElementById('dmg-flash');
                    df.style.background = 'rgba(200,0,40,0.5)';
                    setTimeout(()=>df.style.background='rgba(200,0,40,0)', 120);
                    if (this.player.hp <= 0) { this.player.hp=0; this.gameOver(); }
                }
            }

            if (e.dead) {
                if (e.type === 'exploder') e.explode();
                if (e === this.currentBoss) {
                    this.shake = 18;
                    this.currentBoss = null;
                }
                this.kills++;
                this.combo++; this.comboTimer = 2.2;
                this.gems.push({ x:e.x, y:e.y, xp:e.xpValue });
                this.spawnParticle(e.x, e.y, e.color, 12);
                AudioEngine.sfxKill();
                // 10% chance power-up drop
                if (Math.random() < 0.10) this.spawnPowerUp(e.x, e.y);
                this.enemies.splice(i,1);
            }
        }

        // ── Player projectiles ──
        for (let i=this.projectiles.length-1; i>=0; i--) {
            const p = this.projectiles[i];
            p.life -= dt;

            if (p.type === 'whip') {
                const wx = p.dir===1 ? p.x + p.w/2 : p.x - p.w/2;
                this.enemies.forEach(e => {
                    if (Math.abs(e.x-wx) < p.w/2 && Math.abs(e.y-p.y) < p.h/2) {
                        e.takeDamage(p.dmg * dt * 10);
                        e.knockback.x = p.dir * 300;
                        if (Math.random() < 0.3) {
                            const isCrit = Math.random() < 0.15;
                            this.spawnText(e.x, e.y, Math.floor(p.dmg * (isCrit?2:1)), isCrit);
                        }
                    }
                });
            } else {
                p.x += p.vx*dt; p.y += p.vy*dt;
                for (let j=this.enemies.length-1; j>=0; j--) {
                    const e = this.enemies[j];
                    if (M.dist(p.x,p.y,e.x,e.y) < e.r+(p.r||5)) {
                        const isCrit = Math.random() < 0.15;
                        const dmg = p.dmg * (isCrit?2:1);
                        e.takeDamage(dmg);
                        AudioEngine.sfxHit();
                        this.spawnText(e.x, e.y, Math.floor(dmg), isCrit);
                        this.spawnParticle(e.x, e.y, e.color, 4);
                        p.life = 0; break;
                    }
                }
            }
            if (p.life <= 0) this.projectiles.splice(i,1);
        }

        // ── Enemy projectiles vs player ──
        for (let i=this.enemyProjectiles.length-1; i>=0; i--) {
            const ep = this.enemyProjectiles[i];
            ep.x += ep.vx; ep.y += ep.vy;
            ep.life--;
            if (ep.dmg > 0 && M.dist(ep.x, ep.y, this.player.x, this.player.y) < ep.r+this.player.r && this.player.iframe<=0) {
                if (this.player.activeBuffs.shield > 0) {
                    this.player.activeBuffs.shield = 0;
                } else {
                    this.player.hp -= ep.dmg;
                    this.player.iframe = 0.4;
                    this.shake = 5;
                    if (this.player.hp<=0) { this.player.hp=0; this.gameOver(); }
                }
                ep.life = 0;
            }
            if (ep.life <= 0) this.enemyProjectiles.splice(i,1);
        }

        // ── XP gems ──
        for (let i=this.gems.length-1; i>=0; i--) {
            const g = this.gems[i];
            const d = M.dist(this.player.x, this.player.y, g.x, g.y);
            if (d < this.player.pickupRange) {
                g.x = M.lerp(g.x, this.player.x, dt*10);
                g.y = M.lerp(g.y, this.player.y, dt*10);
            }
            if (d < 14) {
                const xpGain = g.xp * (1 + this.combo*0.04);
                this.player.xp += xpGain;
                while (this.player.xp >= this.player.nextXp) {
                    this.player.xp -= this.player.nextXp;
                    this.player.nextXp = Math.floor(this.player.nextXp*1.32);
                    this.player.level++;
                    this.triggerLevelUp();
                }
                this.gems.splice(i,1);
            }
        }

        // ── Particles with gravity & friction ──
        for (const p of this.particles) {
            p.vy  += p.gravity;
            p.vx  *= p.friction; p.vy *= p.friction;
            p.x   += p.vx; p.y += p.vy;
            p.life -= dt;
        }
        this.particles = this.particles.filter(p => p.life > 0);

        // ── Floating damage texts (curved arc) ──
        for (const t of this.texts) {
            t.vx += t.curve;
            t.x  += t.vx; t.y += t.vy;
            t.vy *= 0.96;
            t.life -= dt;
        }
        this.texts = this.texts.filter(t => t.life > 0);

        this.updateHUD();
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#04010e';
        ctx.fillRect(0,0,canvas.width,canvas.height);

        if (this.state === 'START') return;

        ctx.save();
        // BUG FIX: bidirectional screen shake (was only +x,+y before)
        if (this.shake > 0.5) {
            ctx.translate(
                (Math.random()*2-1) * this.shake,
                (Math.random()*2-1) * this.shake
            );
        }

        const off = { x: this.player.x, y: this.player.y };

        // ── Background decorations ──
        ctx.fillStyle = '#0e0820';
        this.decorations.forEach(d => {
            const sx = d.x - off.x + canvas.width/2;
            const sy = d.y - off.y + canvas.height/2;
            if (sx<-50||sx>canvas.width+50||sy<-50||sy>canvas.height+50) return;
            if (d.type==='rock') {
                ctx.fillStyle=`hsl(${d.hue},30%,12%)`;
                ctx.fillRect(sx, sy, d.size, d.size);
            } else {
                ctx.fillStyle=`hsl(${d.hue},40%,18%)`;
                ctx.beginPath(); ctx.arc(sx,sy,d.size/2,0,Math.PI*2); ctx.fill();
            }
        });

        // ── Power-ups (pulsing bounce animation) ──
        this.powerUps.forEach(pu => {
            const sx = pu.x - off.x + canvas.width/2;
            const sy = pu.y - off.y + canvas.height/2 + Math.sin(pu.pulse)*5;
            ctx.save();
            ctx.shadowColor = pu.color; ctx.shadowBlur = 16;
            ctx.fillStyle = pu.color;
            ctx.globalAlpha = 0.85 + Math.sin(pu.pulse*2)*0.15;
            ctx.beginPath(); ctx.arc(sx,sy,pu.r,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=1; ctx.shadowBlur=0;
            ctx.font='14px serif';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(pu.icon, sx, sy);
            ctx.restore();
        });

        // ── XP gems ──
        const gt = Date.now()*0.003;
        this.gems.forEach(g => {
            const sx = g.x - off.x + canvas.width/2;
            const sy = g.y - off.y + canvas.height/2 + Math.sin(gt)*2;
            ctx.save();
            ctx.shadowColor='#4466ff'; ctx.shadowBlur=10; ctx.fillStyle='#3355dd';
            ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2); ctx.fill(); ctx.restore();
        });

        // ── Enemy projectiles ──
        this.enemyProjectiles.forEach(ep => {
            ctx.save();
            ctx.shadowColor=ep.color; ctx.shadowBlur=CONFIG.IS_MOBILE?6:12;
            ctx.fillStyle=ep.color; ctx.globalAlpha=ep.life/60;
            ctx.beginPath(); ctx.arc(ep.x-off.x+canvas.width/2, ep.y-off.y+canvas.height/2, ep.r,0,Math.PI*2); ctx.fill();
            ctx.restore();
        });

        // ── Enemies ──
        this.enemies.forEach(e => e.draw(ctx, off));

        // ── Player projectiles ──
        this.projectiles.forEach(p => {
            const sx = p.x - off.x + canvas.width/2;
            const sy = p.y - off.y + canvas.height/2;
            ctx.save();
            if (p.type==='knife') {
                ctx.translate(sx,sy); ctx.rotate(p.ang);
                ctx.fillStyle=p.color||'#ffe066';
                ctx.shadowColor='#ffcc00'; ctx.shadowBlur=CONFIG.IS_MOBILE?5:10;
                ctx.fillRect(-11,-2,22,4); ctx.restore();
            } else if (p.type==='whip') {
                ctx.globalAlpha = Math.min(1, p.life*6);
                ctx.fillStyle='#dd6699'; ctx.shadowColor='#ff2255'; ctx.shadowBlur=8;
                const xStart = p.dir===1 ? sx : sx-p.w;
                ctx.fillRect(xStart-off.x+canvas.width/2, sy-off.y+canvas.height/2-p.h/2, p.w, p.h);
                ctx.restore();
            } else {
                ctx.shadowColor=p.color||'#ffdd44'; ctx.shadowBlur=CONFIG.IS_MOBILE?7:14;
                ctx.fillStyle=p.color||'#ffe066';
                ctx.beginPath(); ctx.arc(sx,sy,p.r||6,0,Math.PI*2); ctx.fill(); ctx.restore();
            }
        });

        // ── Persistent weapon draws (Bible, Garlic) ──
        this.player.weapons.forEach(w => { if (w.draw) w.draw(ctx, off); });

        // ── Particles (gravity-affected) ──
        for (const p of this.particles) {
            const alpha = Math.max(0, p.life/p.maxLife);
            ctx.globalAlpha = alpha;
            ctx.fillStyle   = p.color;
            ctx.beginPath();
            ctx.arc(p.x-off.x+canvas.width/2, p.y-off.y+canvas.height/2, p.r*(0.4+alpha*0.6), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // ── Player ──
        this.player.draw(ctx, off);

        // ── Floating damage numbers (curved arc, smooth fade) ──
        ctx.textAlign = 'center';
        for (const t of this.texts) {
            const alpha = Math.max(0, t.life/t.maxLife);
            const scale = t.isCrit ? 1.1+(1-alpha)*0.4 : 1;
            const sx = t.x - off.x + canvas.width/2;
            const sy = t.y - off.y + canvas.height/2;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(sx, sy); ctx.scale(scale, scale);
            if (t.isCrit) {
                ctx.font = 'bold 18px "Press Start 2P",monospace';
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 14;
            } else {
                ctx.font = 'bold 13px Rajdhani,sans-serif';
                ctx.fillStyle = '#ffaa88';
            }
            ctx.fillText(t.text, 0, 0);
            ctx.restore();
        }
        ctx.globalAlpha = 1;

        ctx.restore(); // end shake
    },

    gameOver() {
        if (this.state === 'GAMEOVER') return;
        this.state = 'GAMEOVER';
        const m = Math.floor(this.time/60), s = Math.floor(this.time%60);
        document.getElementById('game-over-stats').innerHTML = `
            <div class="stat-row"><span>Kills Totales:</span><span>${this.kills}</span></div>
            <div class="stat-row"><span>Tiempo Vivido:</span><span>${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span></div>
            <div class="stat-row"><span>Nivel Alcanzado:</span><span>${this.player.level}</span></div>
            <div class="stat-row"><span>Combo Máximo:</span><span>${this.combo}</span></div>
        `;
        setTimeout(() => {
            document.getElementById('gameover-screen').style.display='flex';
        }, 500);
    },

    loop(now) {
        const dt = Math.min((now - (this.lastTime_loop||now)) / 1000, 0.08);
        this.lastTime_loop = now;
        if (this.state !== 'PAUSE') {
            this.update(dt);
            this.draw();
        }
        requestAnimationFrame(t => this.loop(t));
    }
};

Game.init();
</script>
